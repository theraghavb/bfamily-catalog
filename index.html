<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="B.Family">
<meta name="theme-color" content="#0D0D0D">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>B.Family</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --black: #0D0D0D; --off-white: #FAFAF8; --cream: #F5F2EC;
  --espresso: #3D3628; --mid-gray: #888780; --light-gray: #D3D1C7;
  --keep-bg: #EEF2E8; --keep-fg: #2A3D1A;
  --sell-bg: #F2EBE8; --sell-fg: #3D1E14;
  --ca-bg: #E8EDF2; --ca-fg: #1A2A3D;
  --london-bg: #EEEDF5; --london-fg: #1F1A3D;
  --dubai-bg: #F5F0E8; --dubai-fg: #3D2E0A;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: var(--black); overscroll-behavior: none; }

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem;
  transition: opacity .8s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center 70%;
  opacity: .38;
  filter: brightness(0.85) contrast(1.02);
  transition: opacity 1.2s ease;
}
.splash-bg.revealed { opacity: .38; }
.splash-vignette {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(13,13,13,.85) 0%, rgba(13,13,13,.5) 30%, rgba(13,13,13,.15) 50%, rgba(13,13,13,.05) 62%, rgba(13,13,13,.7) 82%, rgba(13,13,13,.96) 100%);
}
.splash-content {
  position: relative; z-index: 2;
  width: 100%; padding: 0 2rem;
  display: flex; flex-direction: column; align-items: center;
  opacity: 1;
}
.splash-eyebrow {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(255,255,255,.9);
  margin-bottom: 14px;
  border-top: 0.5px solid rgba(250,250,248,.12); padding-top: 10px;
  width: 110px; text-align: center;
}
.splash-wordmark {
  font-family: 'EB Garamond', serif; font-size: 38px; font-weight: 400;
  letter-spacing: .12em; color: #FFFFFF;
  margin-bottom: 6px; line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,.8);
}
.splash-sub {
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.85); margin-bottom: 5px;
}
.splash-address {
  font-size: 10px; letter-spacing: .12em;
  color: rgba(255,255,255,.55); margin-bottom: 2.4rem;
}
.splash-input-wrap { width: 200px; margin-bottom: 8px; }
.splash-input {
  width: 100%; background: transparent; border: none;
  border-bottom: 0.5px solid rgba(250,250,248,.25);
  padding: 12px 0; text-align: center; font-size: 14px;
  letter-spacing: .25em; color: #FAFAF8; outline: none;
}
.splash-input::placeholder { color: rgba(250,250,248,.18); font-size: 10px; letter-spacing: .14em; }
.splash-enter {
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(255,255,255,.8); background: none; border: none;
  cursor: pointer; padding: 8px 24px; transition: color .2s; margin-top: 4px;
  font-size: 11px; letter-spacing: .2em;
}
.splash-enter:hover { color: rgba(255,255,255,.9); }
.splash-error { color: #F0A090; font-size: 11px; margin-top: 8px; opacity: 0; transition: opacity .3s; }
.splash-error.show { opacity: 1; }
.splash-location {
  position: absolute; bottom: 20px; font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(255,255,255,.45); z-index: 2;
}

/* ── DESKTOP SPLASH ── */
@media (min-width: 768px) {
  #splash { padding: 0; align-items: stretch; justify-content: stretch; }
  .splash-bg { background-position: center 60%; opacity: .55; filter: brightness(0.8) contrast(1.02); }
  .splash-vignette {
    background: linear-gradient(to bottom, rgba(13,13,13,.65) 0%, rgba(13,13,13,.2) 35%, rgba(13,13,13,.05) 55%, rgba(13,13,13,.5) 78%, rgba(13,13,13,.97) 100%);
  }
  .splash-content {
    position: absolute; bottom: 0; left: 0; right: 0;
    flex-direction: row; align-items: flex-end; justify-content: space-between;
    padding: 0 6% 4rem;
  }
  .splash-left { display: flex; flex-direction: column; align-items: flex-start; }
  .splash-right { display: flex; flex-direction: column; align-items: flex-end; padding-bottom: 4px; }
  .splash-eyebrow { text-align: left; width: auto; border-top: 0.5px solid rgba(250,250,248,.2); padding-top: 10px; margin-bottom: 12px; }
  .splash-wordmark { font-size: 52px; margin-bottom: 6px; }
  .splash-sub { font-size: 10px; margin-bottom: 3px; }
  .splash-address { margin-bottom: 0; }
  .splash-input-wrap { width: 180px; margin-bottom: 6px; }
  .splash-input { text-align: right; }
  .splash-input::placeholder { text-align: right; }
  .splash-enter { padding: 4px 0; text-align: right; }
  .splash-top { position: absolute; top: 0; left: 0; right: 0; padding: 24px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
  .splash-top-eyebrow { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: rgba(250,250,248,.35); }
  .splash-location { position: static; font-size: 9px; }
}

/* ── APP SHELL ── */
#appShell { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; background: var(--off-white); }

/* ── TOP NAV (mobile) ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(.75rem + var(--safe-top)) 1.25rem .75rem;
  background: var(--off-white); border-bottom: 1px solid var(--light-gray);
  flex-shrink: 0;
}
.topbar-brand { font-family: 'EB Garamond', serif; font-size: 20px; letter-spacing: .04em; color: var(--black); }
.topbar-brand span { color: var(--mid-gray); font-size: 16px; }
.topbar-right { display: flex; gap: 8px; }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--cream); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--espresso); transition: background .15s;
}
.topbar-btn:hover { background: var(--light-gray); }
.topbar-btn.primary { background: var(--black); color: var(--off-white); }

/* ── STATS STRIP ── */
.statsstrip {
  display: flex; background: var(--cream);
  border-bottom: 1px solid var(--light-gray); flex-shrink: 0;
  overflow-x: auto; scrollbar-width: none;
}
.statsstrip::-webkit-scrollbar { display: none; }
.sstat {
  flex-shrink: 0; padding: .6rem 1rem;
  border-right: 1px solid var(--light-gray); text-align: center;
  min-width: 70px;
}
.sstat-label { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 2px; }
.sstat-val { font-family: 'EB Garamond', serif; font-size: 22px; line-height: 1; color: var(--black); }

/* ── FILTER PILLS ── */
.filter-scroll {
  display: flex; gap: 6px; padding: .75rem 1.25rem;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
  background: var(--off-white); border-bottom: 1px solid var(--light-gray);
}
.filter-scroll::-webkit-scrollbar { display: none; }
.fpill {
  flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--light-gray); background: transparent;
  font-family: 'Inter', sans-serif; font-size: 12px; color: var(--mid-gray);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.fpill.active { background: var(--black); color: var(--off-white); border-color: var(--black); }
.fpill.active.keep { background: var(--keep-fg); border-color: var(--keep-fg); }
.fpill.active.sell { background: var(--sell-fg); border-color: var(--sell-fg); }

/* ── SEARCH BAR ── */
.searchbar {
  display: flex; align-items: center; gap: 8px;
  padding: .6rem 1.25rem; background: var(--off-white);
  border-bottom: 1px solid var(--light-gray); flex-shrink: 0;
}
.searchbar svg { color: var(--mid-gray); flex-shrink: 0; width: 15px; height: 15px; }
.searchbar input {
  flex: 1; border: none; background: none; font-family: 'Inter', sans-serif;
  font-size: 14px; color: var(--black); outline: none;
}
.searchbar input::placeholder { color: var(--mid-gray); }

/* ── SCROLL AREA ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── PHOTO GRID ── */
.photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; padding: 3px; }
.photo-card { position: relative; cursor: pointer; background: var(--cream); overflow: hidden; border-radius: 2px; }
.photo-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; transition: transform .4s ease; }
.photo-card:hover img { transform: scale(1.03); }
.photo-card:active img { transform: scale(.98); }
.photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 35%, rgba(13,13,13,.55) 65%, rgba(13,13,13,.88) 100%);
}
.photo-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: .6rem .65rem .65rem;
}
.photo-name { font-family: 'EB Garamond', serif; font-size: 13px; color: #fff; line-height: 1.25; margin-bottom: 5px; }
.photo-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.ptag { font-size: 8px; padding: 2px 5px; letter-spacing: .03em; font-weight: 500; border-radius: 1px; }
.ptag-keep { background: rgba(238,242,232,.92); color: var(--keep-fg); }
.ptag-sell { background: rgba(242,235,232,.92); color: var(--sell-fg); }
.ptag-undecided { background: rgba(255,255,255,.15); color: rgba(255,255,255,.7); }
.ptag-ca { background: rgba(232,237,242,.92); color: var(--ca-fg); }
.ptag-london { background: rgba(238,237,245,.92); color: var(--london-fg); }
.ptag-dubai { background: rgba(245,240,232,.92); color: var(--dubai-fg); }
.ptag-antique { background: rgba(245,240,232,.92); color: var(--dubai-fg); }
.photo-num { position: absolute; top: 7px; right: 7px; font-size: 8px; color: rgba(255,255,255,.5); letter-spacing: .04em; background: rgba(13,13,13,.25); padding: 1px 4px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex; background: var(--off-white);
  border-top: 1px solid var(--light-gray); flex-shrink: 0;
  padding-bottom: var(--safe-bottom);
}
.bnav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: .6rem .25rem;
  cursor: pointer; border: none; background: none;
  transition: opacity .15s;
}
.bnav-item:active { opacity: .6; }
.bnav-icon { font-size: 20px; margin-bottom: 2px; }
.bnav-label { font-size: 9px; letter-spacing: .06em; text-transform: uppercase; color: var(--mid-gray); }
.bnav-item.active .bnav-label { color: var(--black); font-weight: 500; }
.bnav-item.active .bnav-icon { filter: brightness(0); }

/* ── DESKTOP LAYOUT ── */
@media(min-width: 768px) {
  .app-desktop { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .sidebar-desktop {
    width: 220px; flex-shrink: 0; background: var(--cream);
    border-right: 1px solid var(--light-gray); overflow-y: auto; padding: 1.25rem 0;
  }
  .main-desktop { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
  .bottom-nav { display: none; }
  .photo-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .photo-card img { aspect-ratio: 3/4; }
  .topbar { padding: .75rem 1.5rem; }
}

/* ── SIDEBAR DESKTOP ── */
.sdlabel { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--mid-gray); padding: 0 1.25rem; margin-bottom: .5rem; }
.sditem { display: flex; align-items: center; justify-content: space-between; padding: 7px 1.25rem; font-size: 13px; color: var(--espresso); cursor: pointer; border-left: 2px solid transparent; transition: background .1s; }
.sditem:hover { background: rgba(0,0,0,.04); }
.sditem.active { background: var(--off-white); border-left-color: var(--black); color: var(--black); font-weight: 500; }
.sdcount { font-size: 11px; color: var(--mid-gray); background: var(--off-white); padding: 2px 7px; border-radius: 10px; }
.sddivider { height: 1px; background: var(--light-gray); margin: .75rem 1.25rem; }
.sdsection { margin-bottom: 1.5rem; }

/* ── DETAIL SHEET (slides up) ── */
.sheet-overlay { display: none; position: fixed; inset: 0; background: rgba(13,13,13,.5); z-index: 300; backdrop-filter: blur(4px); }
.sheet-overlay.open { display: block; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 301;
  background: var(--off-white);
  border-radius: 20px 20px 0 0;
  max-height: 92vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }
@media(min-width: 768px) {
  .sheet { max-width: 560px; left: 50%; right: auto; transform: translateX(-50%) translateY(100%); border-radius: 16px 16px 0 0; }
  .sheet.open { transform: translateX(-50%) translateY(0); }
}
.sheet-handle { width: 36px; height: 4px; background: var(--light-gray); border-radius: 2px; margin: .75rem auto .5rem; }
.sheet-img { width: 100%; height: 260px; object-fit: cover; display: block; }
.sheet-body { padding: 1.25rem 1.5rem; }
.sheet-title { font-family: 'EB Garamond', serif; font-size: 24px; font-weight: 400; margin-bottom: 2px; }
.sheet-room { font-size: 12px; color: var(--mid-gray); letter-spacing: .04em; margin-bottom: 1.25rem; }
.sheet-form-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 5px; display: block; margin-top: 1rem; }
.sheet-input { width: 100%; padding: 10px 12px; border: 1px solid var(--light-gray); background: var(--cream); font-family: 'Inter', sans-serif; font-size: 14px; color: var(--black); border-radius: 0; }
.sheet-input:focus { outline: none; border-color: var(--mid-gray); }
textarea.sheet-input { resize: none; height: 72px; }
.seg { display: flex; border: 1px solid var(--light-gray); margin-top: 5px; }
.seg-btn { flex: 1; padding: 11px 6px; background: transparent; border: none; border-right: 1px solid var(--light-gray); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: .04em; color: var(--mid-gray); transition: all .15s; }
.seg-btn:last-child { border-right: none; }
.seg-btn.ak { background: var(--keep-bg); color: var(--keep-fg); font-weight: 500; }
.seg-btn.as { background: var(--sell-bg); color: var(--sell-fg); font-weight: 500; }
.seg-btn.au { background: var(--cream); color: var(--espresso); font-weight: 500; }
.seg-btn.aca { background: var(--ca-bg); color: var(--ca-fg); font-weight: 500; }
.seg-btn.alon { background: var(--london-bg); color: var(--london-fg); font-weight: 500; }
.seg-btn.adub { background: var(--dubai-bg); color: var(--dubai-fg); font-weight: 500; }
.sheet-actions { display: flex; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--light-gray); }
.sbtn { flex: 1; padding: 13px; border: 1px solid var(--light-gray); background: transparent; font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; color: var(--espresso); transition: all .15s; }
.sbtn:hover { background: var(--cream); }
.sbtn.primary { background: var(--black); color: var(--off-white); border-color: var(--black); flex: 2; }
.sbtn.danger { color: var(--sell-fg); border-color: var(--sell-bg); }
.sbtn:disabled { opacity: .4; }

/* ── ADD SHEET ── */
.upload-zone { border: 1px dashed var(--light-gray); padding: 2rem 1rem; text-align: center; cursor: pointer; color: var(--mid-gray); font-size: 13px; background: var(--cream); transition: all .15s; }
.upload-zone:active { background: var(--light-gray); }

/* ── TOAST ── */
.toast { position: fixed; bottom: calc(5rem + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: var(--black); color: var(--off-white); padding: 10px 20px; font-size: 12px; letter-spacing: .04em; z-index: 500; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; border-radius: 20px; }
.toast.show { opacity: 1; }

/* ── EMPTY ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }
.empty-state p { font-family: 'EB Garamond', serif; font-size: 20px; font-style: italic; color: var(--mid-gray); }

/* ── ROOM GROUPS ── */
.room-group { padding: 1rem 1.25rem .5rem; }
.room-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: .75rem; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-bg" id="splashBg"></div>
  <div class="splash-vignette"></div>
  <div class="splash-top">
    <div class="splash-top-eyebrow">Los Altos Hills</div>
    <div class="splash-location" style="position:static">Private · B.Family</div>
  </div>
  <div class="splash-content" id="splashContent">
    <div class="splash-left">
      <div class="splash-eyebrow">Los Altos Hills</div>
      <div class="splash-wordmark">B.Family</div>
      <div class="splash-sub">Private Collection</div>
      <div class="splash-address">25751 Elena Road</div>
    </div>
    <div class="splash-right">
      <div class="splash-input-wrap">
        <input class="splash-input" type="password" id="authInput" placeholder="access code" onkeydown="if(event.key==='Enter')doAuth()">
      </div>
      <button class="splash-enter" onclick="doAuth()">Enter →</button>
      <div class="splash-error" id="authError">Incorrect password</div>
    </div>
  </div>
  <div class="splash-location" id="splashLocationMobile">Private · B.Family</div>
</div>

<!-- APP -->
<div id="appShell">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-brand">B.Family <span>/ Los Altos</span></div>
    <div class="topbar-right">
      <button class="topbar-btn" onclick="exportCSV()" title="Export CSV">CSV</button>
      <button class="topbar-btn" onclick="exportPDF()" title="Export PDF">PDF</button>
      <button class="topbar-btn primary" onclick="openAdd()">+</button>
    </div>
  </div>

  <!-- DESKTOP LAYOUT -->
  <div class="app-desktop" id="appDesktop" style="display:none">
    <aside class="sidebar-desktop">
      <div class="sdsection">
        <div class="sdlabel">Status</div>
        <div class="sditem active" onclick="setFilter('all',this)">All items <span class="sdcount" id="d-c-all">0</span></div>
        <div class="sditem" onclick="setFilter('keep',this)">Keep <span class="sdcount" id="d-c-keep">0</span></div>
        <div class="sditem" onclick="setFilter('sell',this)">Sell <span class="sdcount" id="d-c-sell">0</span></div>
        <div class="sditem" onclick="setFilter('undecided',this)">Undecided <span class="sdcount" id="d-c-undecided">0</span></div>
      </div>
      <div class="sddivider"></div>
      <div class="sdsection">
        <div class="sdlabel">Destination</div>
        <div class="sditem" onclick="setFilter('ca',this)">California <span class="sdcount" id="d-c-ca">0</span></div>
        <div class="sditem" onclick="setFilter('london',this)">London <span class="sdcount" id="d-c-london">0</span></div>
        <div class="sditem" onclick="setFilter('dubai',this)">Dubai <span class="sdcount" id="d-c-dubai">0</span></div>
      </div>
      <div class="sddivider"></div>
      <div class="sdsection">
        <div class="sdlabel">Tags</div>
        <div class="sditem" onclick="setFilter('antique',this)">Antique <span class="sdcount" id="d-c-antique">0</span></div>
      </div>
      <div class="sddivider"></div>
      <div class="sdsection"><div class="sdlabel">Rooms</div><div id="d-roomnav"></div></div>
    </aside>
    <div class="main-desktop">
      <div class="statsstrip" id="d-statsstrip"></div>
      <div class="searchbar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        <input id="d-search" placeholder="Search…" oninput="render()">
      </div>
      <div class="scroll-area" id="d-content"></div>
    </div>
  </div>

  <!-- MOBILE LAYOUT -->
  <div id="appMobile" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
    <div class="statsstrip" id="m-statsstrip"></div>
    <div class="filter-scroll" id="m-filters">
      <button class="fpill active" data-f="all" onclick="setFilter('all',this)">All</button>
      <button class="fpill keep" data-f="keep" onclick="setFilter('keep',this)">Keep</button>
      <button class="fpill sell" data-f="sell" onclick="setFilter('sell',this)">Sell</button>
      <button class="fpill" data-f="undecided" onclick="setFilter('undecided',this)">Undecided</button>
      <button class="fpill" data-f="ca" onclick="setFilter('ca',this)">California</button>

<script>
const SUPABASE_URL  = window.SUPABASE_URL  || 'https://nzbwxpsuxknjdrqfsjhw.supabase.co';
const SUPABASE_ANON = window.SUPABASE_ANON || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56Ynd4cHN1eGtuamRycWZzamh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTI2MTksImV4cCI6MjA5NDg4ODYxOX0.crPlu07tlIRS8ElTAToINujUppoL0qmlDL91tr9imNw';
const APP_PASSWORD  = window.APP_PASSWORD  || '2575115752';
const BUCKET = 'catalog-images';
const isMobile = () => window.innerWidth < 768;

let items = [], currentFilter = 'all', mobileView = 'grid', activeItem = null;
let addDec = 'undecided', addLoc = null, addAntique = false, pendingFile = null, editFile = null;

// ── SPLASH ──
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('splashBg').classList.add('revealed');
    document.getElementById('splashContent').classList.add('revealed');
  }, 80);
  if (sessionStorage.getItem('bf_auth') === '1') {
    hideSplash(); initApp();
  } else {
    setTimeout(() => document.getElementById('authInput').focus(), 600);
  }
});

function doAuth() {
  const val = document.getElementById('authInput').value;
  if (val === APP_PASSWORD) {
    sessionStorage.setItem('bf_auth', '1');
    hideSplash();
    initApp();
  } else {
    const err = document.getElementById('authError');
    err.classList.add('show');
    document.getElementById('authInput').value = '';
    setTimeout(() => err.classList.remove('show'), 2000);
  }
}

function hideSplash() {
  const s = document.getElementById('splash');
  s.classList.add('fade-out');
  setTimeout(() => s.style.display = 'none', 600);
  const app = document.getElementById('appShell');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  if (isMobile()) {
    document.getElementById('appMobile').style.display = 'flex';
  } else {
    document.getElementById('appDesktop').style.display = 'flex';
  }
}

// ── SUPABASE ──
async function sbFetch(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers }
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text(); return t ? JSON.parse(t) : null;
}

async function sbUpload(file, filename) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
    method: 'POST', headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Content-Type': file.type }, body: file
  });
  if (!res.ok) throw new Error(await res.text());
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${filename}`;
}

// ── INIT ──
async function initApp() {
  try {
    const data = await sbFetch('catalog_items?order=created_at.asc&select=*');
    items = data || [];
    populateSidebar();
    render();
  } catch(e) { showToast('Error loading — ' + e.message); }
}

function populateSidebar() {
  const rooms = [...new Set(items.map(i => i.category))].sort();
  const nav = document.getElementById('d-roomnav');
  if (nav) nav.innerHTML = rooms.map(r => `<div class="sditem" onclick="setFilter('room:${r}',this)">${r} <span class="sdcount">${items.filter(i=>i.category===r).length}</span></div>`).join('');
}

// ── COUNTS ──
function updateCounts() {
  const k = items.filter(i=>i.decision==='keep').length;
  const s = items.filter(i=>i.decision==='sell').length;
  const u = items.filter(i=>!i.decision||i.decision==='undecided').length;
  const ca = items.filter(i=>i.location==='ca').length;
  const lon = items.filter(i=>i.location==='london').length;
  const dub = items.filter(i=>i.location==='dubai').length;
  const ant = items.filter(i=>i.is_antique).length;
  const statsHTML = `
    <div class="sstat"><div class="sstat-label">Total</div><div class="sstat-val">${items.length}</div></div>
    <div class="sstat"><div class="sstat-label">Keep</div><div class="sstat-val" style="color:var(--keep-fg)">${k}</div></div>
    <div class="sstat"><div class="sstat-label">Sell</div><div class="sstat-val" style="color:var(--sell-fg)">${s}</div></div>
    <div class="sstat"><div class="sstat-label">Undecided</div><div class="sstat-val">${u}</div></div>
    <div class="sstat"><div class="sstat-label">CA</div><div class="sstat-val" style="color:var(--ca-fg)">${ca}</div></div>
    <div class="sstat"><div class="sstat-label">LDN</div><div class="sstat-val" style="color:var(--london-fg)">${lon}</div></div>
    <div class="sstat"><div class="sstat-label">DXB</div><div class="sstat-val" style="color:var(--dubai-fg)">${dub}</div></div>
    <div class="sstat"><div class="sstat-label">Antique</div><div class="sstat-val" style="color:var(--espresso)">${ant}</div></div>`;
  ['m-statsstrip','d-statsstrip'].forEach(id => { const el=document.getElementById(id); if(el) el.innerHTML=statsHTML; });
  ['all','keep','sell','undecided','ca','london'].forEach(f => {
    const vals = {all:items.length,keep:k,sell:s,undecided:u,ca,london:lon,dubai:dub};
    ['d-c-',''].forEach(prefix => { const el=document.getElementById(prefix+f); if(el&&el.classList.contains('sdcount')) el.textContent=vals[f]||0; });
  });
}

// ── FILTER ──
function getFiltered() {
  const q = (document.getElementById(isMobile()?'m-search':'d-search')||{value:''}).value.toLowerCase();
  return items.filter(it => {
    if (q && ![it.name,it.category,it.notes||''].join(' ').toLowerCase().includes(q)) return false;
    if (currentFilter === 'keep') return it.decision === 'keep';
    if (currentFilter === 'sell') return it.decision === 'sell';
    if (currentFilter === 'undecided') return !it.decision || it.decision === 'undecided';
    if (currentFilter === 'ca') return it.location === 'ca';
    if (currentFilter === 'london') return it.location === 'london';
    if (currentFilter === 'dubai') return it.location === 'dubai';
    if (currentFilter === 'antique') return !!it.is_antique;
    if (currentFilter.startsWith('room:')) return it.category === currentFilter.slice(5);
    return true;
  });
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.fpill,.sditem').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

function setMobileView(v, el) {
  mobileView = v;
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

// ── RENDER ──
function imgSrc(it) { return it.img_url || it.img || ''; }

function tagsHTML(it) {
  const dec = it.decision || 'undecided';
  const dt = dec==='keep'?`<span class="ptag ptag-keep">Keep</span>`:dec==='sell'?`<span class="ptag ptag-sell">Sell</span>`:`<span class="ptag ptag-undecided">—</span>`;
  const at = it.is_antique ? `<span class="ptag ptag-antique">Antique</span>` : '';
  const lt = it.location==='ca'?`<span class="ptag ptag-ca">CA</span>`:it.location==='london'?`<span class="ptag ptag-london">LDN</span>`:it.location==='dubai'?`<span class="ptag ptag-dubai">DXB</span>`:'';
  return dt + lt + at;
}

function cardHTML(it, idx) {
  return `<div class="photo-card" onclick="openDetail('${it.id}')">
    <div class="photo-num">${String(idx+1).padStart(3,'0')}</div>
    <img src="${imgSrc(it)}" alt="${it.name}" loading="lazy">
    <div class="photo-overlay"></div>
    <div class="photo-body">
      <div class="photo-name">${it.name}</div>
      <div class="photo-tags">${tagsHTML(it)}</div>
    </div>
  </div>`;
}

function render() {
  updateCounts();
  const list = getFiltered();
  const contentId = isMobile() ? 'm-content' : 'd-content';
  const content = document.getElementById(contentId);
  if (!content) return;
  if (!list.length) { content.innerHTML = '<div class="empty-state"><p>No items match this filter</p></div>'; return; }
  const view = isMobile() ? mobileView : 'grid';
  if (view === 'rooms') {
    const byRoom = {};
    list.forEach(it => { if (!byRoom[it.category]) byRoom[it.category]=[]; byRoom[it.category].push(it); });
    content.innerHTML = Object.entries(byRoom).sort(([a],[b])=>a.localeCompare(b)).map(([room,ri]) =>
      `<div class="room-group"><div class="room-label"><span>${room}</span><span>${ri.length}</span></div><div class="photo-grid">${ri.map((it,i)=>cardHTML(it,i)).join('')}</div></div>`
    ).join('');
  } else if (view === 'list') {
    content.innerHTML = `<div style="padding:0">${list.map((it,i) => `
      <div onclick="openDetail('${it.id}')" style="display:flex;align-items:center;gap:12px;padding:10px 1.25rem;border-bottom:1px solid var(--light-gray);cursor:pointer;background:var(--off-white)">
        <img src="${imgSrc(it)}" style="width:52px;height:52px;object-fit:cover;flex-shrink:0;border-radius:4px" loading="lazy">
        <div style="flex:1;min-width:0">
          <div style="font-family:'EB Garamond',serif;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.name}</div>
          <div style="font-size:11px;color:var(--mid-gray)">${it.category||''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">${tagsHTML(it)}</div>
      </div>`).join('')}</div>`;
  } else {
    content.innerHTML = `<div class="photo-grid">${list.map((it,i) => cardHTML(it,i)).join('')}</div>`;
  }
}

// ── DETAIL SHEET ──
function openDetail(id) {
  const it = items.find(i => i.id === id); if (!it) return;
  activeItem = {...it}; editFile = null;
  document.getElementById('sheetImg').src = imgSrc(it);
  document.getElementById('sheetTitle').textContent = it.name;
  document.getElementById('sheetRoom').textContent = it.category || '';
  const dec = it.decision || 'undecided';
  document.getElementById('sheetFormBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="sheet-form-label">Name</label><input class="sheet-input" id="e-name" value="${esc(it.name||'')}"></div>
      <div><label class="sheet-form-label">Room</label><select class="sheet-input" id="e-cat"><option value="">Select room…</option><option value="Backyard">Backyard</option><option value="Breakfast Nook">Breakfast Nook</option><option value="Courtyard">Courtyard</option><option value="Engawa">Engawa</option><option value="Entry">Entry</option><option value="Entry Closet">Entry Closet</option><option value="Entry Half Bath">Entry Half Bath</option><option value="Family Room">Family Room</option><option value="Formal Dining">Formal Dining</option><option value="Formal Living">Formal Living</option><option value="Guest House">Guest House</option><option value="In-Law Suite">In-Law Suite</option><option value="Library">Library</option><option value="Primary Suite">Primary Suite</option><option value="Princess Suite">Princess Suite</option><option value="Tanuja's Office">Tanuja's Office</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label class="sheet-form-label">Est. value</label><input class="sheet-input" id="e-val" value="${esc(it.value||'')}" placeholder="$4,500"></div>
      <div><label class="sheet-form-label">Antique</label><div class="seg" style="margin-top:5px"><button class="seg-btn ${it.is_antique?'ak':''}" id="e-antique" onclick="editToggleAntique()">Antique</button></div></div>
    </div>
    <label class="sheet-form-label">Notes</label>
    <textarea class="sheet-input" id="e-notes">${esc(it.notes||'')}</textarea>
    <label class="sheet-form-label">Replace photo</label>
    <div onclick="document.getElementById('editFile').click()" class="upload-zone" style="padding:.75rem">↑ Upload new photo</div>
    <input type="file" id="editFile" accept="image/*" style="display:none" onchange="handleEditFile(event)">
    <div id="editPreview"></div>
    <label class="sheet-form-label">Decision</label>
    <div class="seg">
      <button class="seg-btn ${dec==='undecided'?'au':''}" onclick="editSetDec('undecided')">Undecided</button>
      <button class="seg-btn ${dec==='keep'?'ak':''}" onclick="editSetDec('keep')">Keep</button>
      <button class="seg-btn ${dec==='sell'?'as':''}" onclick="editSetDec('sell')">Sell</button>
    </div>
    <div id="editLocWrap" style="opacity:${dec==='keep'?1:.4}">
      <label class="sheet-form-label">Location</label>
      <div class="seg">
        <button class="seg-btn ${it.location==='ca'?'aca':''}" onclick="editSetLoc('ca')">California</button>
        <button class="seg-btn ${it.location==='london'?'alon':''}" onclick="editSetLoc('london')">London</button>
        <button class="seg-btn ${it.location==='dubai'?'adub':''}" onclick="editSetLoc('dubai')">Dubai</button>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="sbtn danger" onclick="deleteItem('${it.id}')">Delete</button>
      <button class="sbtn" onclick="closeSheet()">Cancel</button>
      <button class="sbtn primary" id="editSaveBtn" onclick="saveEdit()">Save</button>
    </div>`;
  const catEl = document.getElementById('e-cat'); if(catEl) catEl.value = it.category || '';
  document.getElementById('sheetOverlay').classList.add('open');
  updateNavCounter();
  document.getElementById('detailSheet').classList.add('open');
}

function handleEditFile(e) {
  const f = e.target.files[0]; if (!f) return;
  editFile = f;
  const r = new FileReader();
  r.onload = ev => {
    document.getElementById('sheetImg').src = ev.target.result;
    document.getElementById('editPreview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:120px;object-fit:cover;margin-top:6px">`;
  };
  r.readAsDataURL(f);
}

function editToggleAntique() {
  activeItem.is_antique = !activeItem.is_antique;
  document.getElementById('e-antique').className = activeItem.is_antique ? 'seg-btn ak' : 'seg-btn';
}

function editSetDec(d) {
  activeItem.decision = d;
  document.querySelectorAll('#detailSheet .seg:first-of-type .seg-btn').forEach(b => b.className = 'seg-btn');
  event.target.className = `seg-btn ${d==='keep'?'ak':d==='sell'?'as':'au'}`;
  document.getElementById('editLocWrap').style.opacity = d === 'keep' ? 1 : .4;
}

function editSetLoc(l) {
  activeItem.location = activeItem.location === l ? null : l;
  document.querySelectorAll('#editLocWrap .seg-btn').forEach(b => b.className = 'seg-btn');
  if (activeItem.location) {
    const map = {ca:'aca',london:'alon',dubai:'adub'};
    event.target.className = `seg-btn ${map[activeItem.location]}`;
  }
}

async function saveEdit() {
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    let imgUrl = activeItem.img_url || activeItem.img || null;
    if (editFile) imgUrl = await sbUpload(editFile, `item_${activeItem.id}_${Date.now()}.jpg`);
    const update = {
      name: document.getElementById('e-name').value.trim() || activeItem.name,
      category: document.getElementById('e-cat').value.trim() || activeItem.category,
      value: document.getElementById('e-val').value.trim(),
      notes: document.getElementById('e-notes').value.trim(),
      is_antique: activeItem.is_antique || false,
      decision: activeItem.decision || 'undecided',
      location: activeItem.decision === 'keep' ? (activeItem.location || null) : null,
      img_url: imgUrl, updated_at: new Date().toISOString()
    };
    await sbFetch(`catalog_items?id=eq.${activeItem.id}`, { method: 'PATCH', body: JSON.stringify(update) });
    const idx = items.findIndex(i => i.id === activeItem.id);
    if (idx >= 0) items[idx] = {...items[idx], ...update};
    closeSheet(); render(); showToast('Saved');
  } catch(e) { showToast('Error — ' + e.message); }
  btn.disabled = false; btn.textContent = 'Save';
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  try {
    await sbFetch(`catalog_items?id=eq.${id}`, { method: 'DELETE', headers: {'Prefer':'return=minimal'} });
    items = items.filter(i => i.id !== id);
    closeSheet(); populateSidebar(); render(); showToast('Deleted');
  } catch(e) { showToast('Error — ' + e.message); }
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('detailSheet').classList.remove('open');
  activeItem = null; editFile = null;
}

// ── ADD SHEET ──
function addToggleAntique() {
  addAntique = !addAntique;
  document.getElementById('add-antique').className = addAntique ? 'seg-btn ak' : 'seg-btn';
  document.getElementById('add-antique').textContent = addAntique ? '✓ Antique' : 'Mark as antique';
}

function openAdd() {
  addDec = 'undecided'; addLoc = null; addAntique = false; pendingFile = null;
  ['add-name','add-cat','add-era','add-val','add-notes'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('uploadZone').innerHTML = '<div style="font-size:28px;margin-bottom:6px">↑</div>Tap to upload a photo';
  document.querySelectorAll('#addSheet .seg-btn').forEach(b => b.className = 'seg-btn');
  document.getElementById('add-d-undecided').className = 'seg-btn au';
  document.getElementById('addLocWrap').style.opacity = '.4';
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('addSheet').classList.add('open');
}

function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('addSheet').classList.remove('open');
}

function handleFile(e) {
  const f = e.target.files[0]; if (!f) return;
  pendingFile = f;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('uploadZone').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:180px;object-fit:cover;display:block;margin-bottom:4px"><div style="font-size:11px;color:var(--mid-gray);text-align:center;padding:4px">Tap to replace</div>`; };
  r.readAsDataURL(f);
}

function addSetDec(d) {
  addDec = d;
  document.querySelectorAll('#addSheet .seg:first-of-type .seg-btn').forEach(b => b.className = 'seg-btn');
  document.getElementById('add-d-' + d).className = `seg-btn ${d==='keep'?'ak':d==='sell'?'as':'au'}`;
  document.getElementById('addLocWrap').style.opacity = d === 'keep' ? 1 : .4;
}

function addSetLoc(l) {
  addLoc = addLoc === l ? null : l;
  ['ca','london','dubai'].forEach(x => { document.getElementById('add-l-'+x).className = 'seg-btn'; });
  if (addLoc) { const map={ca:'aca',london:'alon',dubai:'adub'}; document.getElementById('add-l-'+addLoc).className = 'seg-btn ' + map[addLoc]; }
}

async function saveNew() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) { showToast('Name is required'); return; }
  const btn = document.getElementById('addSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    let imgUrl = null;
    if (pendingFile) imgUrl = await sbUpload(pendingFile, `item_${Date.now()}.jpg`);
    const newItem = {
      name, category: document.getElementById('add-cat').value.trim() || 'Uncategorised',
      era: document.getElementById('add-era').value.trim(),
      value: document.getElementById('add-val').value.trim(),
      notes: document.getElementById('add-notes').value.trim(),
      decision: addDec, location: addDec === 'keep' ? (addLoc || null) : null,
      is_antique: addAntique,
      img_url: imgUrl, created_at: new Date().toISOString(), updated_at: new Date().toISOString()
    };
    const result = await sbFetch('catalog_items', { method: 'POST', body: JSON.stringify(newItem) });
    items.push(Array.isArray(result) ? result[0] : result);
    closeAdd(); populateSidebar(); render(); showToast('Item added');
    pendingFile = null;
  } catch(e) { showToast('Error — ' + e.message); }
  btn.disabled = false; btn.textContent = 'Save item';
}


// ── PDF EXPORT ──
function exportPDF() {
  const filtered = getFiltered();
  if (!filtered.length) { alert('No items to export.'); return; }

  const filterLabel = currentFilter === 'all' ? 'All Items'
    : currentFilter === 'antique' ? 'Antiques'
    : currentFilter === 'keep' ? 'Keep'
    : currentFilter === 'sell' ? 'Sell'
    : currentFilter === 'undecided' ? 'Undecided'
    : currentFilter === 'ca' ? 'California'
    : currentFilter === 'london' ? 'London'
    : currentFilter === 'dubai' ? 'Dubai'
    : currentFilter.startsWith('room:') ? currentFilter.slice(5)
    : currentFilter;

  const cards = filtered.map((it, i) => {
    const imgUrl = it.img_url || it.img || '';
    const img = imgUrl
      ? '<img src="' + imgUrl + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
        '<div class="no-img" style="display:none">No photo</div>'
      : '<div class="no-img">No photo</div>';
    const dec = it.decision && it.decision !== 'undecided' ? '<span class="tag">' + it.decision + '</span>' : '';
    const loc = it.location ? '<span class="tag">' + it.location.toUpperCase() + '</span>' : '';
    const ant = it.is_antique ? '<span class="tag antique">Antique</span>' : '';
    const val = it.value ? '<span class="val">' + it.value + '</span>' : '';
    const notes = it.notes ? '<div class="notes">' + it.notes + '</div>' : '';
    return '<div class="card"><div class="num">' + String(i+1).padStart(3,'0') + '</div>' + img +
      '<div class="info"><div class="name">' + (it.name||'') + '</div>' +
      '<div class="room">' + (it.category||'') + '</div>' +
      '<div class="tags">' + dec + loc + ant + val + '</div>' + notes + '</div></div>';
  }).join('');

  const imgUrls = filtered.filter(it => it.image_url).map(it => it.image_url);

  const css = [
    '* { box-sizing: border-box; margin: 0; padding: 0; }',
    'body { font-family: Georgia, serif; background: #FAFAF8; color: #0D0D0D; }',
    '.cover { height: 100vh; background: #0D0D0D; display: flex; flex-direction: column; align-items: center; justify-content: center; page-break-after: always; }',
    '.cover h1 { font-size: 52px; color: #FAFAF8; letter-spacing: .1em; margin-bottom: 8px; font-weight: 400; }',
    '.cover p { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(250,250,248,.4); margin-bottom: 32px; font-family: sans-serif; }',
    '.cover .fl { font-size: 14px; letter-spacing: .15em; text-transform: uppercase; color: rgba(250,250,248,.7); margin-bottom: 8px; font-family: sans-serif; }',
    '.cover .cnt { font-size: 11px; color: rgba(250,250,248,.3); font-family: sans-serif; }',
    '.cover .addr { position: fixed; bottom: 32px; font-size: 10px; letter-spacing: .12em; color: rgba(250,250,248,.2); font-family: sans-serif; }',
    '.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 24px; }',
    '.card { position: relative; background: #F5F2EC; border-radius: 3px; overflow: hidden; break-inside: avoid; }',
    '.num { position: absolute; top: 6px; right: 6px; font-size: 8px; color: rgba(255,255,255,.7); background: rgba(0,0,0,.35); padding: 1px 4px; font-family: sans-serif; z-index: 2; }',
    '.card img { width: 100%; height: 130px; object-fit: cover; display: block; }',
    '.no-img { width: 100%; height: 130px; background: #E8E4DC; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #888; font-family: sans-serif; }',
    '.info { padding: 8px 10px 10px; }',
    '.name { font-size: 13px; margin-bottom: 2px; line-height: 1.3; }',
    '.room { font-size: 9px; color: #888780; margin-bottom: 5px; letter-spacing: .04em; font-family: sans-serif; }',
    '.tags { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; }',
    '.tag { font-size: 8px; padding: 1px 5px; background: #E8E4DC; color: #3D3628; border-radius: 1px; font-family: sans-serif; }',
    '.tag.antique { background: #F0EBE0; color: #5C4A28; }',
    '.val { font-size: 9px; color: #888780; margin-left: auto; font-family: sans-serif; }',
    '.notes { font-size: 9px; color: #888780; line-height: 1.4; margin-top: 4px; font-family: sans-serif; }',
    '.footer { text-align: center; padding: 16px; font-size: 9px; color: #B4B2A9; letter-spacing: .08em; border-top: 0.5px solid #D3D1C7; margin: 0 24px; font-family: sans-serif; }',
    '@media print { @page { margin: 0; size: A4; } .cover { height: 100vh; } img { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }'
  ].join('\n');

  const win = window.open('', '_blank');
  const d = win.document;
  d.open();
  d.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>B.Family - ' + filterLabel + '</title><style>' + css + '</style></head><body>');
  d.write('<div class="cover"><h1>B.Family</h1><p>Los Altos Hills \xb7 Private Collection</p><div class="fl">' + filterLabel + '</div><div class="cnt">' + filtered.length + ' items</div><div class="addr">25751 Elena Road</div></div>');
  d.write('<div class="grid">' + cards + '</div>');
  d.write('<div class="footer">B.Family \xb7 Los Altos Hills \xb7 Private Collection \xb7 25751 Elena Road</div>');
  d.write('</body></html>');
  d.close();

  // Wait for all images to load before printing
  const imgs = win.document.querySelectorAll('img');
  if (imgs.length === 0) { setTimeout(() => win.print(), 500); return; }
  let loaded = 0;
  const total = imgs.length;
  const tryPrint = () => { loaded++; if (loaded >= total) win.print(); };
  imgs.forEach(img => {
    if (img.complete) { tryPrint(); }
    else { img.addEventListener('load', tryPrint); img.addEventListener('error', tryPrint); }
  });
  setTimeout(() => win.print(), 5000);
}


// ── SWIPE NAVIGATION ──
let swipeStartX = 0;

function swipeStart(e) {
  swipeStartX = e.touches[0].clientX;
}

function swipeEnd(e) {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) > 50) navigateDetail(dx < 0 ? 1 : -1);
}

function navigateDetail(dir) {
  const filtered = getFiltered();
  const idx = filtered.findIndex(i => i.id === activeItem.id);
  if (idx === -1) return;
  const next = filtered[idx + dir];
  if (!next) return;
  openDetail(next.id);
}

function updateNavCounter() {
  const filtered = getFiltered();
  const idx = filtered.findIndex(i => i.id === activeItem.id);
  if (idx === -1) return;
  const counter = document.getElementById('sheetCounter');
  if (counter) counter.textContent = (idx+1) + ' of ' + filtered.length;
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.style.opacity = idx === 0 ? '0.3' : '1';
  if (next) next.style.opacity = idx === filtered.length-1 ? '0.3' : '1';
}


// Keyboard arrow navigation for detail sheet
document.addEventListener('keydown', e => {
  if (!document.getElementById('sheetOverlay').classList.contains('open')) return;
  if (document.getElementById('addOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navigateDetail(1);
  if (e.key === 'ArrowLeft') navigateDetail(-1);
  if (e.key === 'Escape') closeSheet();
});

// ── EXPORT ──
function exportCSV() {
  const rows = [['Name','Room','Decision','Location','Value','Notes']];
  items.forEach(i => rows.push([i.name,i.category,i.decision||'undecided',i.location||'',i.value||'',i.notes||'']));
  const csv = rows.map(r => r.map(c => '"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download = 'BFamily_LosAltosHills.csv'; a.click();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeSheet(); closeAdd(); } });
</script>
